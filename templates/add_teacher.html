{% extends "base.html" %}
{% block title %}Add Teacher - Student System{% endblock %}

{% block content %}
<div class="header-actions">
    <h2>Add New Teacher</h2>
    <a href="{{ url_for('index') }}" class="btn btn-outline">Cancel</a>
</div>

<div class="card" style="max-width: 600px;">
    <form method="POST">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="e.g. Dr. Alan Turing">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="alan@cs.edu">
        </div>
        <div class="form-group">
            <label for="department_id">Department (Optional)</label>
            <select name="department_id" id="department_id" style="background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: white; border-radius: 8px; padding: 0.75rem 1rem;">
                <option value="">-- None --</option>
                {% for d in depts %}
                    <option value="{{ d.department_id }}">{{ d.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn">Save Teacher</button>
    </form>
</div>
{% endblock %}
