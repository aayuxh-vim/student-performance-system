{% extends "base.html" %}
{% block title %}Feedback · Student Performance{% endblock %}
{% block content %}

<h1 class="h3 fw-semibold mb-3">Feedback</h1>

<form method="POST" class="card card-sp p-4">

    <select name="student_id" class="form-select mb-2">
        {% for s in students %}
        <option value="{{ s.student_id }}">{{ s.prn or s.student_id }} — {{ s.name }}{% if s.dept_name %} ({{ s.dept_name }}){% endif %}</option>
        {% endfor %}
    </select>

    <select name="section_id" class="form-select mb-2">
        {% for sec in sections %}
        <option value="{{ sec.section_id }}">{{ sec.course_name }} — sem {{ sec.semester }}, {{ sec.year }}{% if sec.room_no %} · {{ sec.room_no }}{% endif %}</option>
        {% endfor %}
    </select>

    <select name="rating" class="form-select mb-2">
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
    </select>

    <textarea name="comments" class="form-control mb-2" placeholder="Comments"></textarea>

    <button class="btn btn-primary">Submit</button>

</form>

{% endblock %}
