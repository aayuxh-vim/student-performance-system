
{% extends "base.html" %}
{% block content %}

<h2>Feedback</h2>

<form method="POST" class="card p-4 shadow-sm">

    <select name="student_id" class="form-select mb-2">
        {% for s in students %}
        <option value="{{ s.student_id }}">{{ s.name }}</option>
        {% endfor %}
    </select>

    <select name="section_id" class="form-select mb-2">
        {% for sec in sections %}
        <option value="{{ sec.section_id }}">Section {{ sec.section_id }}</option>
        {% endfor %}
    </select>

    <select name="rating" class="form-select mb-2">
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
    </select>

    <textarea name="comments" class="form-control mb-2" placeholder="Comments"></textarea>

    <button class="btn btn-primary">Submit</button>

</form>

{% endblock %}
