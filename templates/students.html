{% extends "base.html" %}
{% block content %}

<h2 class="mb-3">Students</h2>

<table class="table table-striped table-hover shadow-sm">
<thead class="table-dark">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Department</th>
</tr>
</thead>

<tbody>
{% for s in students %}
<tr>
    <td>{{ s.student_id }}</td>
    <td>{{ s.name }}</td>
    <td>{{ s.email }}</td>
    <td>{{ s.dept_name }}</td>
</tr>
{% endfor %}
</tbody>
</table>

<a href="/add_student" class="btn btn-success">+ Add Student</a>

{% endblock %}
