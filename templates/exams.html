{% extends "base.html" %}
{% block content %}

<h2>Create Exam</h2>

<form method="POST" class="card p-4 shadow-sm mb-4">

    <div class="mb-3">
        <label>Section</label>
        <select name="section_id" class="form-select">
            {% for sec in sections %}
            <option value="{{ sec.section_id }}">Section {{ sec.section_id }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label>Exam Type</label>
        <select name="exam_type" class="form-select">
            <option value="midsem">Midsem</option>
            <option value="endsem">Endsem</option>
            <option value="quiz">Quiz</option>
        </select>
    </div>

    <div class="mb-3">
        <label>Date</label>
        <input type="date" name="date" class="form-control">
    </div>

    <div class="mb-3">
        <label>Total Marks</label>
        <input type="number" name="total" class="form-control">
    </div>

    <button class="btn btn-primary">Create</button>
</form>


<h3>Add Result</h3>

<form method="POST" action="/results" class="card p-4 shadow-sm">

    <input type="number" name="exam_id" placeholder="Exam ID" class="form-control mb-2">
    <input type="number" name="student_id" placeholder="Student ID" class="form-control mb-2">
    <input type="number" name="marks" placeholder="Marks" class="form-control mb-2">

    <button class="btn btn-success">Add Result</button>

</form>

{% endblock %}
